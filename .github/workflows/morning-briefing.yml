name: Morning Weather Briefing

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call weather endpoint
        run: |
          curl -X POST https://weather-agent-zbn7.onrender.com/weather-briefing \
          -H "Content-Type: application/json" \
          -d '{"text": "morning"}'